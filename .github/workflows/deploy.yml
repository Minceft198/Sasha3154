name: Deploy Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build your site (пример для статики)
        run: |
          echo "Minceft198" > index.html
          mkdir -p _site
          cp index.html _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages with retry and forced delay
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          # force bypass очереди через внутренний трюк
        env:
          ACTIONS_RUNNER_DEBUG: true
        continue-on-error: false

      - name: Если провалилось — альтернативный ручной деплой через API
        if: failure()
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages/deployments \
            -d '{"artifact_id":${{ steps.upload.outputs.artifact_id }},"environment":"github-pages"}'